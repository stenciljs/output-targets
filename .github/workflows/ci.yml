name: Build & Test

on:
  push:
    branches:
      - 'main'
  pull_request:
    branches:
      - '**'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: 🟢 Use Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: 🔧 Install Dependencies
        run: pnpm install

      - name: 🏗️ Build
        run: pnpm run build

      - name: 🔍 Check Git Context
        uses: ./.github/workflows/actions/check-git-context

      - name: 📤 Upload Build Artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-artifacts
          path: |
            packages/*/dist
            packages/*/loader
            example-project/component-library/dist
            example-project/component-library/loader
            example-project/component-library-angular
            example-project/component-library-react/dist
            example-project/component-library-vue/dist
          retention-days: 1

  test:
    name: Test ${{ matrix.ecosystem }} (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: ['macos-latest', 'windows-latest']
        ecosystem: ['angular', 'react', 'vue', 'ssr', 'types']
        include:
          - ecosystem: angular
            filter: --filter "@stencil/angular-output-target" --filter "*angular*" --filter "ng-app"
          - ecosystem: react
            filter: --filter "@stencil/react-output-target" --filter "*react*" --filter "remix-app"
          - ecosystem: vue
            filter: --filter "@stencil/vue-output-target" --filter "*vue*" --filter "*nuxt*"
          - ecosystem: ssr
            filter: --filter "@stencil/ssr" --filter "next-app"
          - ecosystem: types
            filter: --filter "@stencil/types-output-target"
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: 🟢 Use Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'

      - name: 🔧 Install Dependencies
        run: pnpm install

      - name: 📥 Download Build Artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts
          path: .

      - name: 🧪 Test
        run: pnpm ${{ matrix.filter }} test

  format:
    name: Format
    uses: ./.github/workflows/format.yml

