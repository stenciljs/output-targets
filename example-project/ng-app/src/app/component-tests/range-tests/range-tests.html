<div>
  <label>Min</label>
  <my-counter [startValue]="min" (count)="min = $event.detail"></my-counter>
</div>
<div>
  <label>Max</label>
  <my-counter [startValue]="max" (count)="max = $event.detail"></my-counter>
</div>

<my-range [min]="min" [max]="max" [(ngModel)]="rangeValue"></my-range>
<div>Range value: {{ rangeValue }}</div>

<my-range
  [min]="min"
  [max]="max"
  [dualKnobs]="true"
  [(ngModel)]="dualRangeValue"
></my-range>
<div>Lower value: {{ dualRangeValue.lower }}</div>
<div>Upper value: {{ dualRangeValue.upper }}</div>
